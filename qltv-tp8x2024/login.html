<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — TuPhim Admin</title>
    <!-- NO index link, no public reference to this page -->
    <link rel="icon" href="../assets/logo.png" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #060818;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 30% 20%, rgba(79, 142, 247, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 70% 80%, rgba(139, 92, 246, 0.10) 0%, transparent 55%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-wrap img {
            height: 72px;
            width: auto;
            object-fit: contain;
        }

        .subtitle {
            font-size: 13px;
            color: #475569;
            text-align: center;
            margin-top: 6px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
            font-family: inherit;
            font-size: 15px;
            transition: border-color .2s;
            outline: none;
        }

        input:focus {
            border-color: #4f8ef7;
            background: rgba(79, 142, 247, 0.06);
        }

        input::placeholder {
            color: #475569;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4f8ef7, #8b5cf6);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all .2s;
            box-shadow: 0 8px 32px rgba(79, 142, 247, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(79, 142, 247, 0.45);
        }

        .btn-login:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            color: #ef4444;
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 16px;
            text-align: center;
        }

        .error-msg.show {
            display: block;
            animation: fadeUp .3s ease;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .security-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #334155;
        }

        .security-note span {
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div class="bg-grid"></div>

    <div class="card">
        <div class="logo-wrap">
            <img src="../assets/logo.png" alt="TuPhim" />
            <div class="subtitle">Trang quản trị hệ thống</div>
        </div>

        <h1>Đăng nhập Admin</h1>

        <div class="error-msg" id="error-msg"></div>

        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="admin username" autocomplete="off" required />
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="off" required />
            </div>
            <button type="submit" class="btn-login" id="btn-submit">
                <span id="btn-text">Đăng nhập</span>
            </button>
        </form>

        <div class="security-note">
            🔒 <span>Phiên đăng nhập tự động hết hạn sau 8 giờ</span>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        const existingToken = sessionStorage.getItem('admin_token');
        if (existingToken) {
            // Verify token still valid
            fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${existingToken}` }
            }).then(r => r.json()).then(data => {
                if (data.valid) {
                    const adminPath = sessionStorage.getItem('admin_path') || '/qltv-tp8x2024/';
                    window.location.href = adminPath;
                }
            }).catch(() => { });
        }

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
        function hideError() { errorMsg.classList.remove('show'); }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) { showError('Vui lòng điền đầy đủ thông tin.'); return; }

            // Show loading
            btnSubmit.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Đăng nhập thất bại.');
                    btnSubmit.disabled = false;
                    btnText.textContent = 'Đăng nhập';
                    return;
                }

                // Save token & redirect
                sessionStorage.setItem('admin_token', data.token);
                const adminPath = data.adminPath ? `/${data.adminPath}/` : '/qltv-tp8x2024/';
                sessionStorage.setItem('admin_path', adminPath);

                btnText.textContent = '✅ Thành công!';
                setTimeout(() => { window.location.href = adminPath; }, 600);

            } catch (err) {
                showError('Không thể kết nối server. Kiểm tra kết nối mạng.');
                btnSubmit.disabled = false;
                btnText.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>

</html>
