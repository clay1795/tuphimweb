# Nginx config for tuphim.online
# Save to: /etc/nginx/sites-available/tuphim.online

server {
    listen 80;
    server_name tuphim.online www.tuphim.online;
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tuphim.online www.tuphim.online;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/tuphim.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuphim.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory (frontend files)
    root /var/www/tuphim;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    # Hide admin path existence
    add_header X-Robots-Tag "noindex, nofollow";

    # Block access to sensitive files
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
    location ~ /server/ {
        deny all;
        return 404;
    }
    location ~ /certificate/ {
        deny all;
        return 404;
    }

    # API proxy → Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Upload size limit
        client_max_body_size 500M;
        proxy_read_timeout 300s;
    }

    # Serve static frontend
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Manifest files must NOT be cached (OTA install requires fresh)
    location ~* \.plist$ {
        add_header Cache-Control "no-cache, no-store";
        add_header Content-Type "application/x-plist";
    }

    # IPA files - allow large downloads
    location ~* \.ipa$ {
        add_header Content-Type "application/octet-stream";
        client_max_body_size 500M;
    }
}
